```html
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bookytoons — Originals & Series</title>
  <style>
    :root { --bg: #050505; --card: #111; --text: #fff; --muted: #777; }
    body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; margin: 0; }
    
    nav { padding: 30px; display: flex; justify-content: space-between; align-items: center; }
    .logo { font-size: 1.5rem; font-weight: bold; letter-spacing: 2px; }

    .book-wrap { perspective: 1000px; display: inline-block; cursor: pointer; }
    .book { 
      width: 150px; height: 220px; border-radius: 8px; 
      transition: 0.5s; transform-style: preserve-3d;
      animation: bob 3s infinite ease-in-out;
      background: url('https://raw.githubusercontent.com/procatsrandomsources/The-Unkown-/refs/heads/main/Front.png') center/cover;
    }
    .book-wrap:hover .book { animation: hover-anim 1.5s infinite ease-in-out; }
    @keyframes bob { 0%, 100% { transform: translateY(0px); } 50% { transform: translateY(-15px); } }
    @keyframes hover-anim {
      0% { transform: rotateY(0deg) translateY(0); }
      25% { transform: rotateY(180deg) translateY(-20px); }
      50% { transform: rotateY(180deg) translateX(20px); }
      75% { transform: rotateY(180deg) translateX(-20px); }
      100% { transform: rotateY(0deg) translateY(0); }
    }

    .section-title { margin: 50px 30px 20px; font-size: 1.8rem; }
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 30px; padding: 0 30px; }
    .card { background: var(--card); padding: 15px; border-radius: 12px; text-align: center; cursor: pointer; }
    
    #viewer-modal { 
      display: none; position: fixed; inset: 0; background: var(--bg); 
      z-index: 100; overflow-y: auto; padding: 20px;
    }
    .ad-container { height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; }
    .btn { padding: 15px 30px; border-radius: 50px; border: none; font-weight: bold; cursor: pointer; background: white; color: black; }
  </style>
</head>
<body>

<nav>
  <div class="logo">BOOKYTOONS</div>
</nav>

<h2 class="section-title">Originals</h2>
<div class="grid">
  <div class="card" onclick="openViewer()">
    <div class="book-wrap"><div class="book"></div></div>
    <h3>The Unknown</h3>
    <p>Book One: The Start</p>
  </div>
</div>

<h2 class="section-title">Coming Soon</h2>
<div class="grid">
  <div class="card"><div class="book" style="opacity: 0.3; background-image: none; background-color: #222;"></div><p style="color:#777">Coming Soon</p></div>
  <div class="card"><div class="book" style="opacity: 0.3; background-image: none; background-color: #222;"></div><p style="color:#777">Coming Soon</p></div>
  <div class="card"><div class="book" style="opacity: 0.3; background-image: none; background-color: #222;"></div><p style="color:#777">Coming Soon</p></div>
  <div class="card"><div class="book" style="opacity: 0.3; background-image: none; background-color: #222;"></div><p style="color:#777">Coming Soon</p></div>
  <div class="card"><div class="book" style="opacity: 0.3; background-image: none; background-color: #222;"></div><p style="color:#777">Coming Soon</p></div>
</div>

<div id="viewer-modal">
  <button onclick="closeViewer()" class="btn" style="background:#222; color:white;">Close</button>
  
  <div id="ad-phase" class="ad-container">
    <h2 id="ad-title">Watch Ad to Unlock</h2>
    <div style="width:100%; max-width:600px; height:340px; margin:20px;">
      <iframe id="ad-video" width="100%" height="100%" src="" frameborder="0" allow="autoplay; encrypted-media" allowfullscreen></iframe>
    </div>
    <button id="ad-btn" class="btn" onclick="playAd()">Watch Ad</button>
  </div>

  <div id="reader-phase" style="display:none; padding:40px; text-align:center;">
    <embed src="The Unkown.pdf" type="application/pdf" width="100%" height="1200px" />
  </div>
</div>

<script>
  function openViewer() { document.getElementById('viewer-modal').style.display = 'block'; }
  function closeViewer() { document.getElementById('viewer-modal').style.display = 'none'; }

  function playAd() {
    const btn = document.getElementById('ad-btn');
    const title = document.getElementById('ad-title');
    const video = document.getElementById('ad-video');
    
    btn.style.display = 'none';
    video.src = "https://www.youtube.com/embed/OHbw_GA1Ohk?autoplay=1&mute=1";
    
    let time = 10;
    title.innerText = "Ad ends in: " + time + "s";
    const interval = setInterval(() => {
      time--;
      title.innerText = "Ad ends in: " + time + "s";
      if(time <= 0) {
        clearInterval(interval);
        document.getElementById('ad-phase').style.display = 'none';
        document.getElementById('reader-phase').style.display = 'block';
      }
    }, 1000);
  }
</script>
</body>
</html>
