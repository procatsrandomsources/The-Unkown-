
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bookytoons — Originals & Series</title>
  <style>
    :root { --bg: #050505; --card: #111; --text: #fff; --muted: #777; }
    body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; margin: 0; }
    
    /* Header & Navigation */
    nav { padding: 30px; display: flex; justify-content: space-between; align-items: center; }
    .logo { font-size: 1.5rem; font-weight: bold; letter-spacing: 2px; }

    /* Book Animation */
    .book-wrap { perspective: 1000px; display: inline-block; cursor: pointer; }
    .book { 
      width: 150px; height: 220px; background: #333; border-radius: 8px; 
      transition: 0.5s; transform-style: preserve-3d;
      animation: bob 3s infinite ease-in-out;
    }
    .book-wrap:hover .book { 
      animation: none; transform: rotateY(180deg) rotate(5deg); 
    }
    @keyframes bob {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(-15px); }
    }

    /* Library Sections */
    .section-title { margin: 50px 30px 20px; font-size: 1.8rem; }
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 30px; padding: 0 30px; }
    .card { background: var(--card); padding: 15px; border-radius: 12px; text-align: center; }
    .coming-soon { color: var(--muted); font-size: 0.9rem; margin-top: 10px; }

    /* Viewer */
    #viewer-modal { 
      display: none; position: fixed; inset: 0; background: var(--bg); 
      z-index: 100; overflow-y: auto; padding: 50px 20px; 
    }
    .viewer-content { max-width: 800px; margin: auto; }
    .ad-overlay { 
      height: 400px; display: flex; flex-direction: column; align-items: center; 
      justify-content: center; background: #000; border: 1px solid #333; border-radius: 20px;
    }
    .btn { padding: 15px 30px; border-radius: 50px; border: none; font-weight: bold; cursor: pointer; background: white; color: black; }
  </style>
</head>
<body>

<nav>
  <div class="logo">BOOKYTOONS</div>
  <div><a href="#" style="color:white; text-decoration:none;">Library</a></div>
</nav>

<h2 class="section-title">Originals</h2>
<div class="grid">
  <div class="card" onclick="openViewer()">
    <div class="book-wrap"><div class="book"></div></div>
    <h3>The Unknown</h3>
    <p>Book One: The Start</p>
  </div>
</div>

<h2 class="section-title">Coming Soon</h2>
<div class="grid">
  <div class="card"><div class="book" style="opacity: 0.3;"></div><div class="coming-soon">Coming Soon</div></div>
  <div class="card"><div class="book" style="opacity: 0.3;"></div><div class="coming-soon">Coming Soon</div></div>
  <div class="card"><div class="book" style="opacity: 0.3;"></div><div class="coming-soon">Coming Soon</div></div>
  <div class="card"><div class="book" style="opacity: 0.3;"></div><div class="coming-soon">Coming Soon</div></div>
  <div class="card"><div class="book" style="opacity: 0.3;"></div><div class="coming-soon">Coming Soon</div></div>
</div>

<!-- Custom Viewer -->
<div id="viewer-modal">
  <div class="viewer-content">
    <button onclick="document.getElementById('viewer-modal').style.display='none'" class="btn" style="background:#222; color:white;">Close</button>
    <h2 style="margin: 20px 0;">The Unknown: The Start</h2>
    
    <div id="ad-zone" class="ad-overlay">
      <h2 id="ad-text">Watch ad to unlock chapter</h2>
      <button id="ad-btn" class="btn" onclick="playAd()">Watch Ad</button>
    </div>
    
    <div id="reader-zone" style="display:none; text-align:center; padding:50px; border:1px dashed #333;">
      <p>Scroll down to read the story...</p>
      <div style="height: 1000px; background: linear-gradient(#111, #050505);">[PDF Content Placeholder]</div>
    </div>
  </div>
</div>

<script>
  function openViewer() {
    document.getElementById('viewer-modal').style.display = 'block';
  }

  function playAd() {
    const btn = document.getElementById('ad-btn');
    const text = document.getElementById('ad-text');
    btn.style.display = 'none';
    text.innerText = "Playing ad...";
    
    let count = 5;
    const timer = setInterval(() => {
      text.innerText = "Ad playing: " + count;
      count--;
      if(count < 0) {
        clearInterval(timer);
        document.getElementById('ad-zone').style.display = 'none';
        document.getElementById('reader-zone').style.display = 'block';
      }
    }, 1000);
  }
</script>

</body>
</html>
