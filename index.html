<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bookytoons — Editorial Library</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    :root { --bg: #050505; --card: #111; --text: #ffffff; --muted: #777; }
    body { background: var(--bg); color: var(--text); font-family: 'Inter', system-ui, sans-serif; }
    
    /* Flip Card */
    .flip-card { perspective: 1000px; width: 100%; aspect-ratio: 2/3; cursor: pointer; }
    .flip-card-inner { position: relative; width: 100%; height: 100%; transition: transform 0.6s; transform-style: preserve-3d; }
    .flip-card:hover .flip-card-inner { transform: rotateY(180deg); }
    
    .flip-front, .flip-back { 
      position: absolute; width: 100%; height: 100%; backface-visibility: hidden; 
      border-radius: 4px; background-size: cover; background-position: center; border: 1px solid #222;
    }
    .flip-front { background-image: url('https://cdn.discordapp.com/attachments/1284984646043439135/1512528497199943871/Untitled92_20260605153828.png?ex=6a246b6f&is=6a2319ef&hm=c3911d0bf5fc9af76a31b5dc91b43efce7bfec1db8a37ee28f28db448c7ebf45&'); }
    .flip-back { background-image: url('https://cdn.discordapp.com/attachments/1399184342097461351/1512545958620303380/Untitled92_20260605154331.png?ex=6a247bb2&is=6a232a32&hm=01ac43a11b2fb5766d51b92d280b9bf6ee6ceb714cd50a92ef35c710eaaad24f&'); transform: rotateY(180deg); }
    
    /* Scroll Behavior */
    html { scroll-behavior: smooth; }
  </style>
</head>
<body class="min-h-screen">

  <!-- Nav -->
  <nav class="sticky top-0 bg-[#050505]/80 backdrop-blur-md p-6 border-b border-white/5 flex items-center justify-between z-40">
    <div class="text-xl font-bold tracking-widest">BOOKYTOONS</div>
    <div class="flex gap-4 text-xs uppercase tracking-widest text-muted">
      <a href="#originals" class="hover:text-white">Originals</a>
      <a href="#non-originals" class="hover:text-white">Non-Originals</a>
      <a href="#coming-soon" class="hover:text-white">Coming Soon</a>
    </div>
  </nav>

  <!-- Content -->
  <main class="p-8 space-y-16">
    
    <!-- Section: Originals -->
    <section id="originals">
      <h2 class="text-sm uppercase tracking-widest text-muted mb-8">Originals</h2>
      <div class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-6 gap-8">
        <!-- The Unkown Series -->
        <div class="group cursor-pointer" onclick="openSeries('The Unkown Series')">
          <div class="flip-card">
            <div class="flip-card-inner">
              <div class="flip-front"></div>
              <div class="flip-back"></div>
            </div>
          </div>
          <h3 class="mt-4 text-sm font-medium">The Unkown Series</h3>
        </div>
      </div>
    </section>

    <!-- Section: Non-Originals -->
    <section id="non-originals">
      <h2 class="text-sm uppercase tracking-widest text-muted mb-8">Non-Originals</h2>
      <div class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-6 gap-8 opacity-40">
        <div class="border border-dashed border-white/10 aspect-[2/3] flex items-center justify-center rounded-sm">
          <span class="text-xs">Coming Soon</span>
        </div>
      </div>
    </section>

    <!-- Section: Coming Soon -->
    <section id="coming-soon">
      <h2 class="text-sm uppercase tracking-widest text-muted mb-8">Coming Soon Series</h2>
      <div class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-6 gap-8 opacity-40">
        <div class="border border-dashed border-white/10 aspect-[2/3] flex items-center justify-center rounded-sm">
          <span class="text-xs">Coming Soon</span>
        </div>
      </div>
    </section>
  </main>

  <!-- Series Books Modal (Reused for books) -->
  <div id="books-modal" class="fixed inset-0 bg-black z-50 hidden p-8 overflow-y-auto">
    <button onclick="closeBooks()" class="text-sm border border-white/20 px-4 py-2 rounded-full mb-8 hover:bg-white/10">← Back</button>
    <h1 id="series-title" class="text-3xl font-bold mb-8">The Unkown Series</h1>
    <div class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-6 gap-8">
      <!-- Active Book -->
      <div class="cursor-pointer" onclick="openViewer()">
        <div class="flip-card">
          <div class="flip-card-inner">
            <div class="flip-front"></div>
            <div class="flip-back"></div>
          </div>
        </div>
        <h3 class="mt-4 text-sm font-medium">Book One: The Start</h3>
      </div>
      <!-- 5 Coming Soon Book Placeholders -->
      <div class="opacity-30"><div class="flip-card border border-dashed border-white/10 flex items-center justify-center rounded-sm"><span class="text-muted text-xs">Soon</span></div><h3 class="mt-4 text-sm font-medium">Coming Soon</h3></div>
      <div class="opacity-30"><div class="flip-card border border-dashed border-white/10 flex items-center justify-center rounded-sm"><span class="text-muted text-xs">Soon</span></div><h3 class="mt-4 text-sm font-medium">Coming Soon</h3></div>
      <div class="opacity-30"><div class="flip-card border border-dashed border-white/10 flex items-center justify-center rounded-sm"><span class="text-muted text-xs">Soon</span></div><h3 class="mt-4 text-sm font-medium">Coming Soon</h3></div>
      <div class="opacity-30"><div class="flip-card border border-dashed border-white/10 flex items-center justify-center rounded-sm"><span class="text-muted text-xs">Soon</span></div><h3 class="mt-4 text-sm font-medium">Coming Soon</h3></div>
      <div class="opacity-30"><div class="flip-card border border-dashed border-white/10 flex items-center justify-center rounded-sm"><span class="text-muted text-xs">Soon</span></div><h3 class="mt-4 text-sm font-medium">Coming Soon</h3></div>
    </div>
  </div>

  <!-- Reader Modal -->
  <div id="viewer-modal" class="fixed inset-0 bg-black z-[60] hidden">
    <div class="p-6 flex justify-between items-center border-b border-white/10">
      <button onclick="closeViewer()" class="text-sm border border-white/20 px-4 py-2 rounded-full hover:bg-white/10">Close</button>
    </div>

    <!-- Ad Phase -->
    <div id="ad-phase" class="absolute inset-0 flex flex-col items-center justify-center text-center p-4">
      <h2 class="text-2xl font-light mb-6">Unlock Access</h2>
      <div id="video-wrapper" class="hidden w-full max-w-[600px] h-[340px] mb-6 bg-white/5 rounded-lg overflow-hidden">
        <iframe id="ad-video" class="w-full h-full" src="" allow="autoplay; encrypted-media" allowfullscreen></iframe>
      </div>
      <button id="ad-btn" onclick="playAd()" class="bg-white text-black px-8 py-3 rounded-full font-bold">Watch Ad to Unlock</button>
      <div id="timer" class="mt-4 text-muted font-mono"></div>
    </div>

    <!-- Reader Phase -->
    <div id="reader-phase" class="hidden w-full h-[calc(100vh-80px)] overflow-hidden">
      <div style="position:relative;padding-top:max(60%,324px);width:100%;height:0;">
        <iframe style="position:absolute;border:none;width:100%;height:100%;left:0;top:0;" src="https://online.fliphtml5.com/cyvst/dkob/" title="The Unkown" seamless="seamless" scrolling="no" frameborder="0" allowtransparency="true" allowfullscreen="true" ></iframe>
      </div>
    </div>
  </div>

  <script>
    function openSeries(title) {
      document.getElementById('series-title').innerText = title;
      document.getElementById('books-modal').classList.remove('hidden');
    }
    function closeBooks() { document.getElementById('books-modal').classList.add('hidden'); }

    function closeViewer() { document.getElementById('viewer-modal').classList.add('hidden'); }

    function openViewer() {
      document.getElementById('viewer-modal').classList.remove('hidden');
      if(localStorage.getItem('adWatched') === 'true') {
        document.getElementById('ad-phase').classList.add('hidden');
        document.getElementById('reader-phase').classList.remove('hidden');
      } else {
        document.getElementById('ad-phase').classList.remove('hidden');
        document.getElementById('reader-phase').classList.add('hidden');
      }
    }

    function playAd() {
      document.getElementById('ad-btn').classList.add('hidden');
      const wrapper = document.getElementById('video-wrapper');
      wrapper.classList.remove('hidden');
      document.getElementById('ad-video').src = "https://www.youtube.com/embed/OHbw_GA1Ohk?autoplay=1&mute=1";
      
      let time = 10;
      const timer = document.getElementById('timer');
      const interval = setInterval(() => {
        time--;
        timer.innerText = "Ad active: " + time + "s";
        if(time <= 0) {
          clearInterval(interval);
          localStorage.setItem('adWatched', 'true');
          document.getElementById('ad-phase').classList.add('hidden');
          document.getElementById('reader-phase').classList.remove('hidden');
        }
      }, 1000);
    }
  </script>
</body>
</html>
